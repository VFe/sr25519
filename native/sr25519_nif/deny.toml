# cargo-deny policy for the NIF crate. Enforced in CI (audit.yml) so a future
# dependency can't quietly introduce an advisory or an incompatible license.

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive licenses only. schnorrkel is BSD-3-Clause; curve25519-dalek is
# BSD-3-Clause; the rest of the tree is MIT/Apache-2.0/ISC/Unicode.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
# The graph currently has ZERO duplicate crate versions; a new duplicate —
# especially of a curve/crypto crate — is a supply-chain event that deserves a
# human decision, not a warning nobody reads. Add a targeted `skip` here if a
# benign duplicate ever needs to be waved through.
multiple-versions = "deny"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
