name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: conformance (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, full: true }
          - { os: macos-latest, full: true }
          # Windows runs the portable subset: test_helper.exs excludes the
          # :posix_build tests there by itself.
          - { os: windows-latest, full: false }
    env:
      SR25519_FORCE_BUILD: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26.2"
          elixir-version: "1.16.3"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and NIF target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/sr25519_nif

      - name: Cache mix deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: Reject panic = "abort" (BEAM VM-safety guard)
        shell: bash
        run: |
          if grep -RqsE 'panic *= *"abort"' native/*/Cargo.toml native/*/.cargo/; then
            echo "::error::panic = \"abort\" would make a NIF panic kill the VM"; exit 1
          fi
          grep -qE 'panic *= *"unwind"' native/sr25519_nif/Cargo.toml || {
            echo "::error::[profile.release] panic = \"unwind\" is required"; exit 1; }

      - name: Fetch deps
        run: mix deps.get

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: mix format --check-formatted

      - name: Conformance ladder (full)
        if: matrix.full
        run: mix conformance

      - name: Tests (portable subset)
        if: ${{ !matrix.full }}
        run: mix test

      - name: Upload conformance report
        if: ${{ always() && matrix.full }}
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report-${{ matrix.os }}
          path: conformance_report.json
          if-no-files-found: ignore
