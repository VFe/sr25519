name: OpenSSF Scorecard

# Continuous supply-chain posture measurement (pinning, token permissions,
# branch protection, dangerous workflow patterns, ...). Results feed the code
# scanning dashboard and the public REST API/badge.
on:
  schedule:
    - cron: "30 6 * * 1" # weekly, Monday 06:30 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # publish_results: signs the results and publishes to the OpenSSF API
      id-token: write
      # upload the SARIF to the code scanning dashboard
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
