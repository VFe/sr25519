name: Build precompiled NIFs

# Builds a precompiled NIF for every rustler_precompiled target and attaches it to
# the GitHub release together with its signed build-provenance bundle
# (<artifact>.sigstore.json). After all artifacts exist, generate the checksum file
# locally with `mix rustler_precompiled.download Sr25519.Native --all --print`,
# commit it, then publish via the "Publish to Hex" workflow (publish.yml).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Workflow-level default is read-only; the build job elevates only what it needs.
permissions:
  contents: read

jobs:
  build_release:
    name: ${{ matrix.job.target }} (nif ${{ matrix.nif }})
    runs-on: ${{ matrix.job.os }}
    # Deployment gate: once the `release` environment is configured with a
    # required reviewer (see RELEASING.md "Required repository settings"), a
    # human must approve before any release job runs. Auto-created unprotected
    # on first use if the environment does not exist yet.
    environment: release
    permissions:
      # attach artifacts to the GitHub release
      contents: write
      # sign build-provenance attestations for the NIF binaries
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.15"]
        job:
          - { target: aarch64-apple-darwin, os: macos-14 }
          # macos-13 (the last Intel default label) is retired; the -intel
          # labels are the supported way to get x86_64 macOS runners.
          - { target: x86_64-apple-darwin, os: macos-15-intel }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-22.04, use-cross: true }
          - { target: arm-unknown-linux-gnueabihf, os: ubuntu-22.04, use-cross: true }
          - { target: riscv64gc-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-22.04, use-cross: true }
          - { target: x86_64-pc-windows-gnu, os: windows-2022 }
          - { target: x86_64-pc-windows-msvc, os: windows-2022 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Extract project version
        shell: bash
        run: echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n1)" >> "$GITHUB_ENV"

      - name: Assert version extraction and tag consistency
        shell: bash
        run: |
          if [ -z "$PROJECT_VERSION" ]; then
            echo "::error::could not extract @version from mix.exs (formatting changed?)"; exit 1
          fi
          if [[ "$GITHUB_REF" == refs/tags/* && "$GITHUB_REF_NAME" != "v$PROJECT_VERSION" ]]; then
            echo "::error::tag $GITHUB_REF_NAME does not match mix.exs version v$PROJECT_VERSION"; exit 1
          fi

      - name: Lockfile integrity (artifact must build from the committed tree)
        shell: bash
        run: cargo metadata --locked --format-version 1 --manifest-path native/sr25519_nif/Cargo.toml > /dev/null

      - name: Build the NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@67ed0cc2d6a423e4c4cd9ad651dcc6c90f802cdb # v1.1.5
        with:
          project-name: sr25519_nif
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          project-dir: "native/sr25519_nif"

      # Signed build provenance: consumers (and the security review) can verify
      # each precompiled NIF was built by this workflow from this commit via
      # `gh attestation verify <artifact> --repo VFe/sr25519`.
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.build-crate.outputs.file-path }}

      # The attestation lives in GitHub's attestations API, which external
      # scanners (e.g. the OpenSSF Scorecard Signed-Releases check) never read
      # — so the same Sigstore bundle is also attached as a release asset,
      # named after its artifact. Enables fully offline verification:
      # `gh attestation verify <artifact> -R VFe/sr25519 --bundle <artifact>.sigstore.json`.
      - name: Name the attestation bundle after its artifact
        shell: bash
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          ARTIFACT_PATH: ${{ steps.build-crate.outputs.file-path }}
        run: cp "$BUNDLE_PATH" "${ARTIFACT_PATH}.sigstore.json"

      - name: Attach artifact and provenance bundle to the release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ steps.build-crate.outputs.file-path }}
            ${{ steps.build-crate.outputs.file-path }}.sigstore.json
          # Published checksums pin these assets: a re-run of a completed tag
          # build must fail loudly rather than silently replace them. Recover
          # from a half-uploaded job by deleting that job's assets in the UI,
          # never by re-running a fully published build.
          overwrite_files: false
